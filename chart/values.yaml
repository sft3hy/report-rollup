replicaCount: 1

image:
  repository: harbor.i2cv.io/cosmichorizon/report-rollup
  pullPolicy: Always
  tag: ""

imagePullSecrets:
  - name: s-hxl2n

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  portWeb: 8000

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "4"
    memory: "8Gi"

ingress:
  enabled: true
  className: "cosmichorizon-nginx"
  annotations:
    argocd.argoproj.io/tracking-id: report-rollup:networking.k8s.io/Ingress:cosmichorizon/report-rollup
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/configuration-snippet: |
      rewrite ^(/report-rollup)$ $1/ permanent;
    external-dns.alpha.kubernetes.io/target: test-cosmichorizon-worker-68a3110f01feebd0.elb.us-gov-west-1.amazonaws.com

  hosts:
    - host: test-cosmichorizon-worker-68a3110f01feebd0.elb.us-gov-west-1.amazonaws.com
      paths:
        - path: /report-rollup(/|$)(.*)
          pathType: ImplementationSpecific
          backendPort: 8000

  tls: []
